<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- Run triangle (green, brighter for dark theme) -->
  <polygon points="3,2 3,14 13,8" fill="#6AAB73"/>
  <!-- Bug overlay (bottom-right) -->
  <g transform="translate(8, 7) scale(0.55)">
    <!-- Bug body -->
    <ellipse cx="8" cy="10" rx="4" ry="5" fill="#F06A6A"/>
    <!-- Bug head -->
    <circle cx="8" cy="4.5" r="2.5" fill="#F06A6A"/>
    <!-- Antennae -->
    <line x1="6" y1="3" x2="3" y2="0" stroke="#F06A6A" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="10" y1="3" x2="13" y2="0" stroke="#F06A6A" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Legs left -->
    <line x1="4.5" y1="8" x2="1" y2="6" stroke="#F06A6A" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="4" y1="10.5" x2="1" y2="11" stroke="#F06A6A" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="4.5" y1="13" x2="1.5" y2="15.5" stroke="#F06A6A" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Legs right -->
    <line x1="11.5" y1="8" x2="15" y2="6" stroke="#F06A6A" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="12" y1="10.5" x2="15" y2="11" stroke="#F06A6A" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="11.5" y1="13" x2="14.5" y2="15.5" stroke="#F06A6A" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Body line -->
    <line x1="8" y1="6" x2="8" y2="14.5" stroke="#D05050" stroke-width="0.8"/>
  </g>
</svg>
